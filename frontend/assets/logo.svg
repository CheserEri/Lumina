<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- 行星渐变（玻璃质感） -->
    <radialGradient id="planetGradient" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#9ec5ff"/>
      <stop offset="65%" stop-color="#6b7cff"/>
      <stop offset="100%" stop-color="#b06cff"/>
    </radialGradient>

    <!-- 动态高光 -->
    <radialGradient id="highlight" cx="30%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- 光晕 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- 模糊层 -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="black"/>

  <!-- 外层光晕 -->
  <circle cx="256" cy="256" r="140" fill="#7c8cff" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="r" values="135;145;135" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- 行星 -->
  <g>
    <circle cx="256" cy="256" r="110" fill="url(#planetGradient)"/>

    <!-- 动态高光（模拟反射移动） -->
    <circle cx="230" cy="220" r="80" fill="url(#highlight)">
      <animate attributeName="cx" values="220;260;220" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="210;240;210" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 后层轨道（在星球后面） -->
  <g stroke="rgba(255,255,255,0.2)" fill="none">
    <ellipse cx="256" cy="256" rx="170" ry="60" stroke-width="1"/>
    <ellipse cx="256" cy="256" rx="200" ry="80" stroke-width="1"/>
  </g>

  <!-- 后层卫星 -->
  <g fill="white" opacity="0.6">
    <circle r="2">
      <animateMotion dur="10s" repeatCount="indefinite"
        path="M 86 256 A 170 60 0 1 1 426 256 A 170 60 0 1 1 86 256"/>
    </circle>
    <circle r="2.5">
      <animateMotion dur="14s" repeatCount="indefinite"
        path="M 56 256 A 200 80 0 1 1 456 256 A 200 80 0 1 1 56 256"/>
    </circle>
  </g>

  <!-- 前层轨道 -->
  <g stroke="rgba(255,255,255,0.35)" fill="none">
    <ellipse cx="256" cy="256" rx="170" ry="60" stroke-width="1.2"
      stroke-dasharray="2 4">
      <animateTransform attributeName="transform" type="rotate"
        from="0 256 256" to="360 256 256" dur="40s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- 前层卫星 -->
  <g fill="white">
    <circle r="3">
      <animateMotion dur="8s" repeatCount="indefinite"
        path="M 86 256 A 170 60 0 1 1 426 256 A 170 60 0 1 1 86 256"/>
    </circle>
  </g>

  <!-- 星尘 -->
  <g fill="white" opacity="0.4">
    <circle cx="100" cy="100" r="1"/>
    <circle cx="420" cy="80" r="1"/>
    <circle cx="80" cy="400" r="1"/>
    <circle cx="430" cy="420" r="1"/>
  </g>

</svg>